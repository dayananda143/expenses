<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#059669"/>
  <!-- Wallet body -->
  <rect x="10" y="20" width="44" height="30" rx="5" fill="white" opacity="0.95"/>
  <!-- Wallet flap -->
  <rect x="10" y="20" width="44" height="10" rx="5" fill="white"/>
  <rect x="10" y="25" width="44" height="5" fill="white"/>
  <!-- Coin slot / pocket -->
  <rect x="36" y="28" width="14" height="14" rx="4" fill="#059669" opacity="0.15"/>
  <circle cx="43" cy="35" r="5" fill="none" stroke="#059669" stroke-width="2"/>
  <line x1="43" y1="32" x2="43" y2="38" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="35" x2="46" y2="35" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lines representing money -->
  <rect x="14" y="30" width="16" height="2.5" rx="1.25" fill="#6ee7b7"/>
  <rect x="14" y="35" width="10" height="2.5" rx="1.25" fill="#6ee7b7"/>
</svg>
